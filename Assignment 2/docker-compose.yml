services:
  master:
    image: mpi_app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: master
    privileged: true
    sysctls:
      - net.ipv4.ip_forward=1
    volumes:
      - ./images:/app/images
      - ./output:/app/output
    networks:
      mpi_network:
        ipv4_address: 172.28.0.100
      mpi_control_network:
        ipv4_address: 172.25.0.100
    stdin_open: true
    tty: true
    environment:
      - OMPI_ALLOW_RUN_AS_ROOT=1
      - OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1
    depends_on:
      - worker1
      - worker2
      - worker3
      - worker4
      - worker5
      - worker6

  worker1: &worker_net1
    image: mpi_app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worker1
    cap_add: [NET_ADMIN]
    volumes:
      - ./images:/app/images
      - ./output:/app/output
    networks:
      - mpi_network
    environment:
      - OMPI_ALLOW_RUN_AS_ROOT=1
      - OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1

  worker2: { <<: *worker_net1, container_name: worker2 }
  worker3: { <<: *worker_net1, container_name: worker3 }

  worker4: &worker_net2
    image: mpi_app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: worker4
    cap_add: [NET_ADMIN]
    volumes:
      - ./images:/app/images
      - ./output:/app/output
    networks:
      - mpi_control_network
    environment:
      - OMPI_ALLOW_RUN_AS_ROOT=1
      - OMPI_ALLOW_RUN_AS_ROOT_CONFIRM=1

  worker5: { <<: *worker_net2, container_name: worker5 }
  worker6: { <<: *worker_net2, container_name: worker6 }

networks:
  mpi_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

  mpi_control_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24
